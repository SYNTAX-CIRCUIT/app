<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us | Syntax Circuit</title>

<link rel="icon" href="syntaxLogo.jpg">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

:root{
--primary:#ff4d94;
--secondary:#0056b3;
}

body{
font-family:Arial;
background:#f8f9fa;
}

/* Navbar */

.navbar{
box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

/* Contact section */

.contact-section{
padding:70px 0;
}

.section-title{
text-align:center;
font-size:2.5rem;
color:var(--secondary);
font-weight:bold;
margin-bottom:40px;
}

/* Form */

.contact-card{
background:white;
border-radius:10px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.form-control{
border-radius:8px;
}

.form-control:focus{
border-color:var(--primary);
box-shadow:0 0 8px rgba(255,77,148,0.5);
}

.btn-primary{
background:var(--primary);
border:none;
}

.btn-primary:hover{
background:#ff6699;
}

/* Map */

.map-container{
margin-top:50px;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

/* Success popup */

.success-popup{
position:fixed;
top:20px;
right:20px;
background:#28a745;
color:white;
padding:15px 25px;
border-radius:6px;
display:none;
z-index:9999;
}

/* Floating WhatsApp */

.whatsapp-float{
position:fixed;
bottom:25px;
right:25px;
background:#25d366;
color:white;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
z-index:9999;
}

.whatsapp-float:hover{
transform:scale(1.1);
color:white;
}

/* Footer */

footer{
margin-top:60px;
padding:20px;
text-align:center;
background:#f8f9fa;
}

</style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top">

<div class="container">

<a class="navbar-brand" href="index.html">
<img src="syntaxLogo.jpg" height="30"> Syntax Circuit
</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav ms-auto">

<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
<li class="nav-item"><a class="nav-link" href="tuitions.html">Tuitions</a></li>
<li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
<li class="nav-item"><a class="nav-link" href="about.html">About</a></li>

</ul>

</div>
</div>

</nav>

<!-- Success popup -->

<div id="successPopup" class="success-popup">
✔ Message Sent Successfully!
</div>

<!-- Contact Section -->

<section class="contact-section">

<div class="container">

<h2 class="section-title">Contact Us</h2>

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="contact-card">

<form id="contactForm">

<div class="row">

<div class="col-md-6 mb-3">
<label>Name</label>
<input type="text" id="name" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>WhatsApp Number</label>
<input type="tel" id="phone" class="form-control" required>
</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" id="email" class="form-control" required>
</div>

<div class="col-md-6 mb-3">

<label>Purpose</label>

<select id="purpose" class="form-control">

<option>Courses</option>
<option>Tuitions</option>
<option>Final Year Projects</option>
<option>Other</option>

</select>

</div>

</div>

<div class="mb-3">

<label>Message</label>

<textarea id="message" class="form-control" rows="4"></textarea>

</div>

<button class="btn btn-primary w-100">

<i class="fas fa-paper-plane"></i> Send Message

</button>

</form>

</div>

</div>

</div>

<!-- Google Maps -->

<div class="map-container">

<iframe 
width="100%" 
height="400" 
frameborder="0"
src="https://maps.google.com/maps?q=hyderabad&t=&z=13&ie=UTF8&iwloc=&output=embed">
</iframe>

</div>

</div>

</section>

<!-- Floating WhatsApp -->

<a href="https://wa.me/916302204738" class="whatsapp-float" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

<!-- Footer -->

<footer>

<p>© 2026 Syntax Circuit</p>

<p>Email: <a href="mailto:info@syntaxcircuit.in">info@syntaxcircuit.in</a></p>

</footer>

<script>

document.getElementById("contactForm").addEventListener("submit",function(e){

e.preventDefault();

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let email=document.getElementById("email").value;
let purpose=document.getElementById("purpose").value;
let message=document.getElementById("message").value;

let lead={
name:name,
phone:phone,
email:email,
purpose:purpose,
message:message,
date:new Date().toLocaleString()
};

/* Store lead */

let leads=JSON.parse(localStorage.getItem("syntaxLeads")) || [];
leads.push(lead);
localStorage.setItem("syntaxLeads",JSON.stringify(leads));

/* Email */

let body =
"Name: "+name+"%0D%0A"+
"Phone: "+phone+"%0D%0A"+
"Email: "+email+"%0D%0A"+
"Purpose: "+purpose+"%0D%0A%0D%0A"+
"Message: "+message;

window.location.href=
"mailto:info@syntaxcircuit.in?subject=Website Lead&body="+body;

/* Popup */

let popup=document.getElementById("successPopup");
popup.style.display="block";

setTimeout(()=>{
popup.style.display="none";
},3000);

this.reset();

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
